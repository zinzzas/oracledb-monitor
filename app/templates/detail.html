<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>{{ title }} · Oracle DB Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root {
    --bg: #121212; --panel: #1e1e1e; --panel-border: #2a2a2a;
    --text: #e8e8e8; --body-c: #d0d0d0; --muted: #8a8a8a;
    --hairline: #333333; --hairline-strong: #444444; --surface-soft: #252525;
    --surface-dark: #0d0d0d;
    --on-dark: #ffffff; --on-primary: #0a0a0a;
    --primary: #4ade80; --primary-dark: #22c55e;
    --radius: 4px;
    --font: 'Inter', Arial, Helvetica, sans-serif;
    --gap-sm: 12px; --gap-md: 20px; --gap-lg: 24px;
    --ink: var(--text); --canvas: var(--panel);
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:var(--font); }
  header { display:flex; align-items:center; gap:var(--gap-sm); padding:0 var(--gap-lg); height:48px; background:var(--surface-dark); border-bottom:1px solid var(--panel-border); }
  header a.back {
    color:var(--on-dark); text-decoration:none; font-size:12px; font-weight:700;
    border:1px solid var(--hairline-strong); border-radius:999px; padding:5px 14px;
  }
  header a.back:hover { background:var(--primary); color:var(--on-primary); border-color:var(--primary); }
  header h1 { font-size:14px; margin:0; font-weight:700; color:var(--on-dark); letter-spacing:.02em; }
  main { padding:var(--gap-lg); padding-bottom:48px; max-width:1320px; margin:0 auto; display:flex; flex-direction:column; gap:var(--gap-md); }

  .searchbar {
    background:var(--panel); border:1px solid var(--panel-border); border-radius:var(--radius);
    padding:var(--gap-md); display:flex; flex-wrap:wrap; align-items:center; gap:var(--gap-sm);
  }
  .searchbar label { font-size:11px; color:var(--muted); margin-right:2px; font-weight:700; text-transform:uppercase; }
  .searchbar input, .searchbar select {
    background:var(--surface-soft); border:1px solid var(--hairline); color:var(--text); border-radius:var(--radius);
    padding:8px 10px; font-size:12.5px; font-family:var(--font);
  }
  .quickbtn {
    background:transparent; border:1px solid var(--hairline); color:var(--text); border-radius:999px;
    padding:7px 16px; font-size:12px; font-weight:700; cursor:pointer; font-family:var(--font);
  }
  .quickbtn:hover { border-color:var(--body-c); }
  .quickbtn.active { background:var(--primary); border-color:var(--primary); color:var(--on-primary); }
  .btn-retrieve {
    background:var(--primary); border:1px solid var(--primary); color:var(--on-primary); border-radius:999px;
    padding:8px 20px; font-size:12px; cursor:pointer; font-weight:700; font-family:var(--font);
  }
  .btn-retrieve:hover { background:var(--primary-dark); border-color:var(--primary-dark); }
  .sep { width:1px; height:22px; background:var(--hairline); margin:0 4px; }

  .panel { background:var(--panel); border:1px solid var(--panel-border); border-radius:var(--radius); padding:var(--gap-md); }
  .panel h2 { font-size:12px; color:var(--body-c); margin:0 0 var(--gap-sm) 0; letter-spacing:.02em; font-weight:700; }
  #chart { width:100%; height:460px; }
  .note { font-size:12px; color:var(--muted); margin-top:12px; line-height:1.6; }
  .loading { color:var(--muted); font-size:12.5px; }
</style>
</head>
<body>
<header>
  <a class="back" href="/">← 대시보드로</a>
  <h1>{{ title }}</h1>
</header>
<main>
  <div class="searchbar">
    <button class="quickbtn" data-range="1h">최근 1시간</button>
    <button class="quickbtn" data-range="6h">최근 6시간</button>
    <button class="quickbtn" data-range="today">오늘</button>
    <button class="quickbtn" data-range="yesterday">어제</button>
    <div class="sep"></div>
    <label>From</label>
    <input type="datetime-local" id="from-input">
    <label>To</label>
    <input type="datetime-local" id="to-input">
    {% if is_sysstat %}
    <div class="sep"></div>
    <label>Stat</label>
    <select id="stat-select">
      {% for s in tracked_stats %}
      <option value="{{ s }}">{{ s }}</option>
      {% endfor %}
    </select>
    {% endif %}
    <button class="btn-retrieve" id="btn-retrieve">조회</button>
  </div>

  <div class="panel">
    <h2>{{ title }} — 구간을 드래그(줌)하면 그 구간의 최대값이 자동으로 표시됩니다</h2>
    <div id="chart"><div class="loading">조회 버튼을 눌러 데이터를 불러오세요.</div></div>
    <div class="note" id="footnote"></div>
  </div>
</main>

<script>
const METRIC = "{{ metric }}";
const chartEl = document.getElementById('chart');
let chart = null;

function toLocalInputValue(d) {
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function setRange(from, to) {
  document.getElementById('from-input').value = toLocalInputValue(from);
  document.getElementById('to-input').value = toLocalInputValue(to);
}

function applyQuickRange(kind) {
  const now = new Date();
  let from, to = now;
  if (kind === '1h') { from = new Date(now.getTime() - 3600 * 1000); }
  else if (kind === '6h') { from = new Date(now.getTime() - 6 * 3600 * 1000); }
  else if (kind === 'today') { from = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0); }
  else if (kind === 'yesterday') {
    const y = new Date(now); y.setDate(y.getDate() - 1);
    from = new Date(y.getFullYear(), y.getMonth(), y.getDate(), 0, 0, 0);
    to = new Date(y.getFullYear(), y.getMonth(), y.getDate(), 23, 59, 59);
  }
  setRange(from, to);
  document.querySelectorAll('.quickbtn').forEach(b => b.classList.toggle('active', b.dataset.range === kind));
  fetchAndRender();
}

document.querySelectorAll('.quickbtn').forEach(btn => {
  btn.addEventListener('click', () => applyQuickRange(btn.dataset.range));
});
document.getElementById('btn-retrieve').addEventListener('click', () => {
  document.querySelectorAll('.quickbtn').forEach(b => b.classList.remove('active'));
  fetchAndRender();
});

function ensureChart() {
  if (!chart) {
    chartEl.innerHTML = '';
    chart = echarts.init(chartEl, null, {renderer:'svg'});
    if (window.ResizeObserver) {
      const observer = new ResizeObserver(() => {
        try {
          chart.resize();
        } catch (e) {
          console.error(e);
        }
      });
      observer.observe(chartEl);
    } else {
      window.addEventListener('resize', () => chart.resize());
    }
  }
  return chart;
}

const baseGrid = { left: 10, right: 60, top: 60, bottom: 74, containLabel: true };
const baseDataZoom = [
  { type: 'inside', start: 0, end: 100 },
  { type: 'slider', start: 0, end: 100, height: 22, bottom: 12,
    borderColor: '#444444', fillerColor: 'rgba(74,222,128,.15)', handleStyle: {color:'#4ade80'},
    textStyle: {color:'#8a8a8a'}, backgroundColor: '#1e1e1e' }
];
const baseTextStyle = { color: '#8a8a8a', fontSize: 11, fontFamily: 'Inter, sans-serif' };
const baseAxisLine = { lineStyle: { color: '#444444' } };
const baseSplitLine = { lineStyle: { color: '#2a2a2a' } };
const baseAxisLabel = { color: '#8a8a8a' };
const baseNameStyle = { color: '#8a8a8a' };
const baseLegend = { top: 0, textStyle: {color:'#8a8a8a'}, icon: 'circle' };
const LINE_W = 3;
const LINE_W_THIN = 2;
// 말풍선: 꼬리 끝 (0,0) → 피크에 맞춤, 본체는 위로만 확장
const BUBBLE_PATH = 'path://M0,0 L8,-9 L26,-9 Q30,-9 30,-13 L30,-30 Q30,-34 26,-34 L-26,-34 Q-30,-34 -30,-30 L-30,-13 Q-30,-9 -26,-9 L-8,-9 Z';
const BUBBLE_SIZE = [66, 38];
const BUBBLE_TIP_OFFSET_Y = -17;
// label의 y 오프셋을 -3으로 보정하여 말풍선 연두색 사각형 몸통 중앙에 수치가 들어가도록 함
const BUBBLE_LABEL_OFFSET_Y = -3;

function bubbleMarkPoint(lineColor, formatter) {
  return {
    symbol: BUBBLE_PATH,
    symbolSize: BUBBLE_SIZE,
    symbolKeepAspect: true,
    symbolOffset: [0, BUBBLE_TIP_OFFSET_Y],
    z: 30,
    itemStyle: { color: lineColor, borderWidth: 0 },
    label: {
      show: true,
      color: '#ffffff',
      fontWeight: 'bold',
      fontSize: 11,
      fontFamily: 'Inter, sans-serif',
      lineHeight: 13,
      align: 'center',
      verticalAlign: 'middle',
      offset: [0, BUBBLE_LABEL_OFFSET_Y],
      formatter: formatter || (p => p.value)
    },
    data: [{ type: 'max', name: 'max' }]
  };
}

// 시간대 표기를 24:00:00 형식으로 통일 (로케일 기본값에 의존하지 않고 직접 포맷팅)
function pad2(n) { return String(n).padStart(2, '0'); }
function fmtTime24(d) { return `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`; }
function fmtDateTime24(d) { return `${pad2(d.getMonth()+1)}/${pad2(d.getDate())} ${fmtTime24(d)}`; }

function tsToLabel(tsSec) {
  return fmtDateTime24(new Date(tsSec * 1000));
}

function lineSeries(name, color, data, opts) {
  opts = opts || {};
  return Object.assign({
    name, type: 'line', data, showSymbol: false, lineStyle: {color, width: opts.width || LINE_W},
    itemStyle: {color},
    markPoint: bubbleMarkPoint(color)
  }, opts.stack ? {stack: opts.stack, areaStyle: {opacity: .6}} : {});
}

async function fetchDetail(start, end, stat) {
  const params = new URLSearchParams({ start, end });
  if (stat) params.set('stat', stat);
  const res = await fetch(`/api/detail/${METRIC}?${params}`);
  return res.json();
}

async function fetchAndRender() {
  const fromEl = document.getElementById('from-input');
  const toEl = document.getElementById('to-input');
  if (!fromEl.value || !toEl.value) { applyQuickRange('6h'); return; }
  const start = Math.floor(new Date(fromEl.value).getTime() / 1000);
  const end = Math.floor(new Date(toEl.value).getTime() / 1000);
  const statSel = document.getElementById('stat-select');
  const stat = statSel ? statSel.value : null;

  // ensureChart()를 먼저 호출해 DOM을 확보한 다음, 로딩은 ECharts 내장 API로 표시
  // (chartEl.innerHTML을 직접 덮어쓰면 이미 생성된 차트의 DOM이 파괴되어 두 번째 검색부터 깨짐)
  ensureChart();
  chart.showLoading({ text: '조회 중...', color: '#4ade80', textColor: '#8a8a8a', maskColor: 'rgba(18,18,18,0.85)' });
  const data = await fetchDetail(start, end, stat);
  chart.hideLoading();

  let option;
  const footnote = document.getElementById('footnote');
  footnote.textContent = '';

  if (METRIC === 'cpu-mem') {
    const xs = data.buckets.map(b => tsToLabel(b.ts));
    option = {
      backgroundColor: 'transparent', textStyle: baseTextStyle, grid: baseGrid, dataZoom: baseDataZoom,
      tooltip: { trigger: 'axis' }, legend: baseLegend,
      xAxis: { type: 'category', data: xs, axisLine: baseAxisLine, axisLabel: baseAxisLabel },
      yAxis: [
        { type:'value', name:'CPU %', max:100, splitLine: baseSplitLine, nameTextStyle: baseNameStyle, axisLabel: baseAxisLabel },
        { type:'value', name:'Mem(MB)', splitLine:{show:false}, nameTextStyle: baseNameStyle, axisLabel: baseAxisLabel, boundaryGap: [0, '15%'] }
      ],
      series: [
        Object.assign(lineSeries('CPU% MAX', '#4ade80', data.buckets.map(b => b.cpu_pct_max)), {yAxisIndex:0}),
        Object.assign(lineSeries('CPU% AVG', '#22c55e', data.buckets.map(b => b.cpu_pct_avg), {width:LINE_W_THIN}), {yAxisIndex:0, lineStyle:{color:'#22c55e', width:LINE_W_THIN, type:'dashed'}, markPoint: {show:false}}),
        Object.assign(lineSeries('Mem Used MAX', '#fb923c', data.buckets.map(b => b.mem_used_mb_max)), {yAxisIndex:1})
      ]
    };
  } else if (METRIC === 'active-sessions') {
    const xs = data.buckets.map(b => tsToLabel(b.ts));
    option = {
      backgroundColor: 'transparent', textStyle: baseTextStyle, grid: baseGrid, dataZoom: baseDataZoom,
      tooltip: { trigger: 'axis' }, legend: baseLegend,
      xAxis: { type: 'category', data: xs, axisLine: baseAxisLine, axisLabel: baseAxisLabel },
      yAxis: { type:'value', name:'세션수', splitLine: baseSplitLine, nameTextStyle: baseNameStyle, axisLabel: baseAxisLabel, boundaryGap: [0, '15%'] },
      series: [
        lineSeries('MAX', '#22d3ee', data.buckets.map(b => b.active_sessions_max)),
        Object.assign(lineSeries('AVG', '#60a5fa', data.buckets.map(b => b.active_sessions_avg), {width:LINE_W_THIN}), {lineStyle:{color:'#60a5fa', width:LINE_W_THIN, type:'dashed'}, markPoint: {show:false}})
      ]
    };
  } else if (METRIC === 'lock-waiting') {
    const xs = data.buckets.map(b => tsToLabel(b.ts));
    option = {
      backgroundColor: 'transparent', textStyle: baseTextStyle, grid: baseGrid, dataZoom: baseDataZoom,
      tooltip: { trigger: 'axis' }, legend: baseLegend,
      xAxis: { type: 'category', data: xs, axisLine: baseAxisLine, axisLabel: baseAxisLabel },
      yAxis: { type:'value', name:'대기 세션수', splitLine: baseSplitLine, nameTextStyle: baseNameStyle, axisLabel: baseAxisLabel, boundaryGap: [0, '15%'] },
      series: [
        lineSeries('MAX', '#f87171', data.buckets.map(b => b.cnt_max)),
        Object.assign(lineSeries('AVG', '#fb923c', data.buckets.map(b => b.cnt_avg), {width:LINE_W_THIN}), {lineStyle:{color:'#fb923c', width:LINE_W_THIN, type:'dashed'}, markPoint: {show:false}})
      ]
    };
  } else if (METRIC === 'wait-class') {
    const classes = Object.keys(data.series || {});
    const allTs = new Set();
    classes.forEach(c => data.series[c].forEach(p => allTs.add(p.ts)));
    const xsSorted = Array.from(allTs).sort((a,b) => a-b);
    const xs = xsSorted.map(tsToLabel);
    const colors = {'User I/O':'#22d3ee','System I/O':'#60a5fa','Concurrency':'#facc15','Application':'#f87171','Commit':'#4ade80','Network':'#e879f9','Configuration':'#8a8a8a','Administrative':'#fb923c','Scheduler':'#a78bfa','Cluster':'#bef264','Queueing':'#6b7280','Other':'#4b5563'};
    option = {
      backgroundColor: 'transparent', textStyle: baseTextStyle, grid: baseGrid, dataZoom: baseDataZoom,
      tooltip: { trigger: 'axis' }, legend: baseLegend,
      xAxis: { type: 'category', data: xs, axisLine: baseAxisLine, axisLabel: baseAxisLabel },
      yAxis: { type:'value', name:'초', splitLine: baseSplitLine, nameTextStyle: baseNameStyle, axisLabel: baseAxisLabel, boundaryGap: [0, '15%'] },
      series: classes.map(c => {
        const byTs = Object.fromEntries(data.series[c].map(p => [p.ts, p.wait_sec]));
        return lineSeries(c, colors[c] || '#6b7280', xsSorted.map(t => byTs[t] ?? 0), {stack:'wc', width:LINE_W_THIN, markPoint: {show:false}});
      })
    };
    footnote.textContent = '수집기 배포 시점부터의 데이터만 존재합니다 (V$SYSTEM_EVENT 델타 기반, AWR 미사용).';
  } else if (METRIC === 'cpu-breakdown') {
    const xs = data.buckets.map(b => tsToLabel(b.ts));
    option = {
      backgroundColor: 'transparent', textStyle: baseTextStyle, grid: baseGrid, dataZoom: baseDataZoom,
      tooltip: { trigger: 'axis' }, legend: baseLegend,
      xAxis: { type: 'category', data: xs, axisLine: baseAxisLine, axisLabel: baseAxisLabel },
      yAxis: { type:'value', name:'%', max:100, splitLine: baseSplitLine, nameTextStyle: baseNameStyle, axisLabel: baseAxisLabel },
      series: [
        Object.assign(lineSeries('User', '#f87171', data.buckets.map(b => b.user_pct_avg), {stack:'cpu', width:LINE_W_THIN}), {markPoint: {show:false}}),
        Object.assign(lineSeries('Sys', '#4ade80', data.buckets.map(b => b.sys_pct_avg), {stack:'cpu', width:LINE_W_THIN}), {markPoint: {show:false}}),
        Object.assign(lineSeries('IO Wait', '#fb923c', data.buckets.map(b => b.iowait_pct_avg), {stack:'cpu', width:LINE_W_THIN}), {markPoint: {show:false}})
      ]
    };
    footnote.textContent = 'V$OSSTAT 누적치 델타 기반 추정 분해입니다. 플랫폼에 따라 IO Wait 값이 없을 수 있습니다.';
  } else if (METRIC === 'sysstat') {
    const xs = data.buckets.map(b => tsToLabel(b.ts));
    option = {
      backgroundColor: 'transparent', textStyle: baseTextStyle, grid: baseGrid, dataZoom: baseDataZoom,
      tooltip: { trigger: 'axis' }, legend: baseLegend,
      xAxis: { type: 'category', data: xs, axisLine: baseAxisLine, axisLabel: baseAxisLabel },
      yAxis: { type:'value', name: (data.stat || '') + ' /sec', splitLine: baseSplitLine, nameTextStyle: baseNameStyle, axisLabel: baseAxisLabel, boundaryGap: [0, '15%'] },
      series: [
        lineSeries('MAX', '#4ade80', data.buckets.map(b => b.rate_per_sec_max)),
        Object.assign(lineSeries('AVG', '#22d3ee', data.buckets.map(b => b.rate_per_sec_avg), {width:LINE_W_THIN}), {lineStyle:{color:'#22d3ee', width:LINE_W_THIN, type:'dashed'}, markPoint: {show:false}})
      ]
    };
    footnote.textContent = `V$SYSSTAT '${data.stat}' 누적치 델타 기반 초당 레이트 (라이선스 무관 베이스 뷰).`;
  } else if (METRIC === 'total-sessions') {
    const xs = data.buckets.map(b => tsToLabel(b.ts));
    option = {
      backgroundColor: 'transparent', textStyle: baseTextStyle, grid: baseGrid, dataZoom: baseDataZoom,
      tooltip: { trigger: 'axis' }, legend: baseLegend,
      xAxis: { type: 'category', data: xs, axisLine: baseAxisLine, axisLabel: baseAxisLabel },
      yAxis: { type:'value', name:'세션수', splitLine: baseSplitLine, nameTextStyle: baseNameStyle, axisLabel: baseAxisLabel, boundaryGap: [0, '15%'] },
      series: [
        lineSeries('Total MAX', '#4ade80', data.buckets.map(b => b.total_max)),
        Object.assign(lineSeries('Total AVG', '#22c55e', data.buckets.map(b => b.total_avg), {width:LINE_W_THIN}), {lineStyle:{color:'#22c55e', width:LINE_W_THIN, type:'dashed'}, markPoint: {show:false}}),
        lineSeries('Active AVG', '#fb923c', data.buckets.map(b => b.active_avg))
      ]
    };
  } else if (METRIC === 'long-session') {
    const xs = data.buckets.map(b => tsToLabel(b.ts));
    option = {
      backgroundColor: 'transparent', textStyle: baseTextStyle, grid: baseGrid, dataZoom: baseDataZoom,
      tooltip: { trigger: 'axis' }, legend: baseLegend,
      xAxis: { type: 'category', data: xs, axisLine: baseAxisLine, axisLabel: baseAxisLabel },
      yAxis: { type:'value', name:'세션수', splitLine: baseSplitLine, nameTextStyle: baseNameStyle, axisLabel: baseAxisLabel, boundaryGap: [0, '15%'] },
      series: [
        { name:'<3s', type:'bar', stack:'ls', data: data.buckets.map(b => b.cnt_lt3_avg), itemStyle:{color:'#4ade80'} },
        { name:'<10s', type:'bar', stack:'ls', data: data.buckets.map(b => b.cnt_lt10_avg), itemStyle:{color:'#22d3ee'} },
        { name:'<15s', type:'bar', stack:'ls', data: data.buckets.map(b => b.cnt_lt15_avg), itemStyle:{color:'#facc15'} },
        { name:'≥15s', type:'bar', stack:'ls', data: data.buckets.map(b => b.cnt_ge15_avg), itemStyle:{color:'#f87171'} }
      ]
    };
    footnote.textContent = '수집기가 폴링마다 실행 중 세션의 elapsed_sec을 4단계로 집계한 값입니다 (MaxGauge의 "인스턴스별" 스택을 단일 인스턴스 특성에 맞게 "시간대별" 구간으로 변형).';
  }

  chart.setOption(option, true);
}

// URL 쿼리(?stat=...)로 들어온 경우 초기 지표 선택 (대시보드 상세보기 링크에서 사용)
(function() {
  const statSel = document.getElementById('stat-select');
  const qsStat = new URLSearchParams(location.search).get('stat');
  if (statSel && qsStat) {
    const opt = Array.from(statSel.options).find(o => o.value === qsStat);
    if (opt) statSel.value = qsStat;
  }
})();

// 초기 로드: 최근 6시간
applyQuickRange('6h');
</script>
</body>
</html>
